<html>
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body>
        <div class="container">
            <div class="card">
                <div class="card-header text-center">
                    Nome do RPG - Criado por Luiza
                </div>
                <div class="card-body" 
                style="background-image: url('assets/oi..jpg'); background-size: cover;">
                <div class="row">
                    <div class="col">
                        <ul class="list-group float-end text-center" style="width: 225px">
                                <li class="list-group-item"><strong id="nome-hero"></strong></li>
                                <li id="titulo-heroi" class="list-group-item"></li>
                                <li class="list-group-item">
                                    ❤️
                                    <progress id="hp-hero" value=100 max=100 style="accent-color: rgb(255, 0, 0);"></progress>
                                </li>
                                <li class="list-group-item">
                                    🧪
                                    <progress id="mp-hero" value=100 max=100 style="accent-color: rgb(153, 0, 255);"></progress>
                                </li>
                                <li class="list-group-item">
                                    ⚡
                                    <progress id="en-hero" value=13 max=100 style="accent-color: rgb(255, 0, 200);"></progress>
                                </li>
                            </ul>

                    </div>
                    <div class="col">
                        <ul class="list-group float-start text-center" style="width: 225px">
                                <li class="list-group-item"><strong id="nome-boss"></strong></li>
                                <li id="titulo-boss" class="list-group-item"></li>
                                <li class="list-group-item">
                                    ❤️
                                    <progress id="hp-boss" value=100 max=100 style="accent-color: rgb(255, 0, 0);"></progress>
                                </li>
                                <li class="list-group-item">
                                    🧪
                                    <progress id="mp-boss" value=100 max=100 style="accent-color: rgb(68, 235, 3);"></progress>
                                </li>
                                <li class="list-group-item">
                                    ⚡
                                    <progress id="en-boss" value=40 max=100 style="accent-color: rgb(255, 251, 3);"></progress>
                                </li>
                            </ul>
                        </div>
                        <div class="row">
                            <div class="col text-end">
                                <img src="assets/oii..webp" width="350px" height="400px"/>
                                <div class="btn-group" id="controles"></div>
                            </div>
                             <div class="col">
                                <img src="assets/Goblin.webp" width="400px" height="400px"/>
                             </div>
                        </div>
                </div>
            </div>
            <div class="card-footer text-center">
                <small class="text-muted"> Ações do Herói</small>
                <p></p>
                <small class="text-muted">Ações do Boss</small>
            </div>
            </div>
        </div>
    </body>
    <script src="javascript.js"></script>
</html>
